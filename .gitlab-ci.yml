default:
   services:
     - postgres

variables:
  POSTGRES_DB: ecommerce
  POSTGRES_USER: api
  POSTGRES_PASSWORD: mga6ugr_kgz1aur!YBQ

workflow:
  rules:
  - if: '$CI_COMMIT_BRANCH == "master"'
build-job:
  image: mcr.microsoft.com/dotnet/sdk:8.0
  stage: build
  script:
    - 'dotnet restore "./DummyShopApi/DummyShopApi.csproj"'
    - 'dotnet build "./DummyShopApi/DummyShopApi.csproj" -c Release -o /app/build'

test-unitaire:
  image: mcr.microsoft.com/dotnet/sdk:8.0
  stage: test
  script:
    - dotnet test TestUnitaire/TestUnitaire.csproj -c Release --logger "trx"

test-integration:
  image: mcr.microsoft.com/dotnet/sdk:8.0
  stage: test
  variables:
    ConnectionString: Host=postgres;Database=ecommerce;Username=api;Password=mga6ugr_kgz1aur!YBQ
  script:
    - dotnet test TestIntegrations/TestIntegrations.csproj -c Release --logger "trx"

deploy-prod:
  stage: deploy
  image: quay.io/buildah/stable
  variables:
    # Use vfs with buildah. Docker offers overlayfs as a default, but Buildah
    # cannot stack overlayfs on top of another overlayfs filesystem.
    STORAGE_DRIVER: vfs
    # Write all image metadata in the docker format, not the standard OCI format.
    # Newer versions of docker can handle the OCI format, but older versions, like
    # the one shipped with Fedora 30, cannot handle the format.
    BUILDAH_FORMAT: docker
    FQ_IMAGE_NAME: "$CI_REGISTRY_IMAGE/toto"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | buildah login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  #   - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - buildah images
    - buildah build -t $FQ_IMAGE_NAME -f DummyShopApi/Dockerfile .
    - buildah images
    - buildah push $FQ_IMAGE_NAME