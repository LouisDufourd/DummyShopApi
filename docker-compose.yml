    image: ${DOCKER_REGISTRY-}dummyshopapi
    build:
      context: .
      dockerfile: DummyShopApi/Dockerfile
    environment:
      ConnectionString: Server=postgresql;database=ecom;uid=website;Pwd=CuL2p3meU8jp9A8GJVhu;Port=5432
      TypeDB: POSTGRESQL
  postgresql:
    image: postgres:latest
